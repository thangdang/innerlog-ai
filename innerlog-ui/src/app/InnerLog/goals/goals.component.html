<div class="app-page-title">
  <div class="page-title-wrapper">
    <div class="page-title-heading">
      <div class="page-title-icon"><i class="fa fa-bullseye icon-gradient bg-plum-plate"></i></div>
      <div>Goals <div class="page-title-subheading">Quản lý mục tiêu người dùng</div></div>
    </div>
  </div>
</div>

<div class="main-card mb-3 card">
  <div class="card-body">
    <table class="table table-hover table-striped">
      <thead>
        <tr>
          <th>Mục tiêu</th>
          <th>Loại</th>
          <th>Tiến độ</th>
          <th>Trạng thái</th>
          <th>Ngày tạo</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let g of goals">
          <td>{{ g.title }}</td>
          <td><span class="badge bg-info">{{ g.category }}</span></td>
          <td>
            <div class="progress" style="height: 20px;">
              <div class="progress-bar bg-success" [style.width.%]="g.progress">{{ g.progress }}%</div>
            </div>
          </td>
          <td><span class="badge" [ngClass]="{'bg-success': g.status === 'completed', 'bg-primary': g.status === 'active', 'bg-secondary': g.status === 'abandoned'}">{{ g.status }}</span></td>
          <td>{{ g.created_at | date:'dd/MM/yyyy' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
